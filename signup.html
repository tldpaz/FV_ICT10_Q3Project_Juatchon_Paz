<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>

    <!-- Bootstrap CSS for pre-made responsive styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

   <style>

/* ============================= */
/*        GLOBAL PAGE STYLE      */
/* ============================= */

/* Background and overall layout */
body {
    font-family: Arial, sans-serif;
    background-image: url(https://img.freepik.com/premium-photo/abstract-background-gradient-defocused-luxury-vivid-blurred-colorful-texture-wallpaper-photo_98870-2111.jpg);
    background-repeat: no-repeat;
    background-position: center;
    background-size: cover;
    margin: 0;
    padding: 20px;
}

/* ============================= */
/*        HEADING STYLE          */
/* ============================= */

h2 {
    color: rgb(248, 221, 255);
    background-color: plum;
    text-align: center;
    font-family: Forte;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.26);
    border: 2px solid purple;
    padding: 10px;
}

/* ============================= */
/*      MAIN FORM CONTAINER      */
/* ============================= */

.container-box {
    max-width: 477px;
    margin: auto;
    background-color: white;
    padding: 60px;
    border: 2px solid purple;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.699);
}

/* ============================= */
/*        INPUT FIELDS           */
/* ============================= */

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid pink;
}

/* ============================= */
/*        BUTTON STYLE           */
/* ============================= */

button {
    width: 100%;
    padding: 10px;
    background-color: pink;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.534);
    border: none;
}

/* Button hover effect */
button:hover {
    background-color: plum;
}

/* ============================= */
/*        OUTPUT MESSAGE         */
/* ============================= */

#output {
    margin-top: 15px;
    font-weight: bold;
    text-align: center;
}

/* ============================= */
/*        NAVIGATION LINKS       */
/* ============================= */

a {
    color: rgb(248, 221, 255);
    background-color: plum;
    text-align: center;
    font-family: Forte;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.26);
    border-style: solid;
    border-color: purple;
}

</style>
</head>

<body>

<!-- Navigation bar for switching between pages -->
<nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Intramurals</a>
    <div>
      <a class="btn btn-danger me-2" href="signup.html">Sign Up</a>
      <a class="btn btn-warning me-2" href="teamchecker.html">Team Checker</a>
      <a class="btn btn-success" href="players.html">Players</a>
    </div>
  </div>
</nav>

<!-- Sign Up Form Container -->
<div class="container-box">

    <h2>Create Account</h2>

    <!-- Username input field -->
    <input id="username" type="text" placeholder="Enter Username">

    <!-- Password input field -->
    <input id="password" type="password" placeholder="Enter Password">

    <!-- Button to trigger registration check -->
    <button id="signupBtn">Sign Up</button>

    <!-- Message will display here -->
    <p id="output"></p>
</div>

<script>
/*
This script runs when the Sign Up button is clicked.
It checks if both fields are filled.
If empty → shows red warning.
If filled → shows green success message.
*/

document.getElementById("signupBtn").addEventListener("click", function() {

    // Get input values and remove extra spaces
    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();
    let output = document.getElementById("output");

    // Check if fields are empty
    if (username === "" || password === "") {
        output.innerText = "Please fill in all fields.";
        output.style.color = "red";
    } 
    else {
        output.innerText = "You are registered!";
        output.style.color = "green";
    }

});
</script>

</body>
</html>
