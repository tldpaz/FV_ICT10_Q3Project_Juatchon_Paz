<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url(https://img.freepik.com/premium-photo/abstract-background-gradient-defocused-luxury-vivid-blurred-colorful-texture-wallpaper-photo_98870-2111.jpg);
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            margin: 0;
            padding: 20px;
        }

        h2 {
            color: rgb(248, 221, 255);
            background-color: plum;
            text-align: center;
            font-family: Forte;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.26);
            border: 2px solid purple;
            padding: 10px;
        }

        .container-box {
            max-width: 477px;
            margin: auto;
            background-color: white;
            padding: 60px;
            border: 2px solid purple;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.699);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid pink;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: pink;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.534);
            border: none;
        }

        button:hover {
            background-color: plum;
        }

        #output {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
        }
        a {
            color: rgb(248, 221, 255);
            background-color: plum;
            text-align: center;
            font-family: forte;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.26);
            border-style: solid;
            border-color: purple;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Intramurals</a>
    <div>
      <a class="btn btn-danger me-2" href="signup.html">Sign Up</a>
      <a class="btn btn-warning me-2" href="teamchecker.html">Team Checker</a>
      <a class="btn btn-success" href="players.html">Players</a>
    </div>
  </div>
</nav>

<div class="container-box">
    <h2>Create Account</h2>

    <input id="username" type="text" placeholder="Enter Username">
    <input id="password" type="password" placeholder="Enter Password">
    <button id="signupBtn">Sign Up</button>

    <p id="output"></p>
</div>

<script>
document.getElementById("signupBtn").addEventListener("click", function() {

    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();
    let output = document.getElementById("output");

    if (username === "" || password === "") {
        output.innerText = "Please fill in all fields.";
        output.style.color = "red";
    } else {
        output.innerText = "You are registered!";
        output.style.color = "green";
    }

});
</script>

</body>
</html>
